<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="sealed case file background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0b0a"/>
      <stop offset="0.55" stop-color="#1a130d"/>
      <stop offset="1" stop-color="#06070a"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="20%" r="56%">
      <stop offset="0" stop-color="#e2aa5f" stop-opacity=".34"/>
      <stop offset=".52" stop-color="#a66338" stop-opacity=".13"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
