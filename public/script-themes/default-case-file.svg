    <circle cx="820" cy="545" r="58" fill="#5d1d28" stroke="#d4a35b" stroke-width="5" opacity=".9"/>
    <path d="M790 545h60M820 515v60" stroke="#f1c47b" stroke-width="6" stroke-linecap="round" opacity=".55"/>
    <path d="M350 575C480 470 610 612 720 520" fill="none" stroke="#8b2238" stroke-width="5" opacity=".75"/>
    <circle cx="350" cy="575" r="10" fill="#c74750"/><circle cx="720" cy="520" r="10" fill="#c74750"/>
